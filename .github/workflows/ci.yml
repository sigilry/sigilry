name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci_pr_internal:
    name: CI (internal PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Warm Nix toolchain
        run: nix develop --command bash -lc "node --version && corepack yarn --version && bun --version"

      - name: Flake checks
        run: nix flake check

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/cache
            .yarn/unplugged
            .yarn/install-state.gz
            node_modules
            .turbo
            ~/.cache/node/corepack
          key: ${{ runner.os }}-deps-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/patches/**', 'flake.lock') }}

      - name: Run CI checks in Nix devShell
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            corepack yarn install --immutable
            corepack yarn workspace @sigilry/canton-json-api codegen:check
            corepack yarn typecheck
            corepack yarn lint
            corepack yarn format:check
            corepack yarn knip
            corepack yarn build
            corepack yarn test
          '

  ci_main_trusted:
    name: CI (main trusted)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Warm Nix toolchain
        run: nix develop --command bash -lc "node --version && corepack yarn --version && bun --version"

      - name: Flake checks
        run: nix flake check

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/cache
            .yarn/unplugged
            .yarn/install-state.gz
            node_modules
            .turbo
            ~/.cache/node/corepack
          key: ${{ runner.os }}-deps-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.yarn/patches/**', 'flake.lock') }}

      - name: Run CI checks in Nix devShell
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            corepack yarn install --immutable
            corepack yarn workspace @sigilry/canton-json-api codegen:check
            corepack yarn typecheck
            corepack yarn lint
            corepack yarn format:check
            corepack yarn knip
            corepack yarn build
            corepack yarn test
          '
